<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Mestrado - Resultados</title>

<style>
body {
    font-family: Arial;
    max-width: 900px;
    margin: 40px auto;
    background: #f4f4f4;
}

.box {
    background: white;
    padding: 20px;
    border-radius: 10px;
    margin-bottom: 20px;
}

/* Avatar */
#avatar {
    width: 120px;
    display: block;
    margin: 10px auto;
    transition: transform 0.2s;
}

/* Animação falando */
.falando {
    animation: falar 0.3s infinite;
}

@keyframes falar {
    0% { transform: scale(1); }
    50% { transform: scale(1.08); }
    100% { transform: scale(1); }
}

input {
    width: 70%;
    padding: 10px;
}

button {
    padding: 10px;
    cursor: pointer;
}

#resposta {
    margin-top: 15px;
    padding: 10px;
    background: #eee;
    border-radius: 8px;
}

img {
    max-width: 100%;
}
</style>
</head>

<body>

<div class="box">
<h1>Resultados do Mestrado</h1>
<p>Análise de simulação e melhorias do artigo.</p>
</div>

<div class="box">
<h2>Gráfico</h2>
<img src="melhoria1_graficos_IC.png">
</div>

<div class="box">
<h2>Assistente Virtual</h2>

<img id="avatar" src="https://cdn-icons-png.flaticon.com/512/4712/4712027.png">

<input type="text" id="pergunta" placeholder="Digite sua pergunta">
<button onclick="responder()">Enviar</button>

<div id="resposta">Faça uma pergunta...</div>

</div>

<script>

function falar(texto) {
    const avatar = document.getElementById("avatar");

    const msg = new SpeechSynthesisUtterance(texto);
    msg.lang = "pt-BR";

    // Ativa animação
    avatar.classList.add("falando");

    msg.onend = function() {
        avatar.classList.remove("falando");
    };

    speechSynthesis.speak(msg);
}

function responder() {
    let p = document.getElementById("pergunta").value.toLowerCase();
    let r = "";

    if (p.includes("objetivo")) {
        r = "O objetivo do trabalho é analisar resultados de simulação com melhorias estatísticas.";
    }
    else if (p.includes("melhoria 1")) {
        r = "A melhoria 1 mostra gráficos com intervalo de confiança de 95 por cento.";
    }
    else if (p.includes("melhoria 2")) {
        r = "A melhoria 2 apresenta um modelo analítico do atraso.";
    }
    else if (p.includes("melhoria 3")) {
        r = "A melhoria 3 apresenta análise estatística completa.";
    }
    else if (p.includes("melhoria 4")) {
        r = "A melhoria 4 utiliza k-means para análise NILM.";
    }
    else {
        r = "Pergunta não reconhecida. Tente falar sobre objetivo ou melhorias.";
    }

    document.getElementById("resposta").innerText = r;
    falar(r);
}

</script>

</body>
</html>
